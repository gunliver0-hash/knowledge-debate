<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
<title>辩论证伪 · 知识流</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="辩论证伪">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="description" content="刷知识像刷短视频——冷知识、纠误解、数据冲击、思想辩论，打开就能看。">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: #050505;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}

#app { width: 100%; height: 100%; position: relative; }

/* ═══ FEED ═══ */
#feed {
  width: 100%; height: 100%;
  position: relative; overflow: hidden;
  touch-action: pan-y;
}

/* ── Filter chips ── */
.chip-bar {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 20;
  display: flex; gap: 8px; padding: max(3vh, env(safe-area-inset-top, 12px)) 5vw 10px;
  overflow-x: auto;
  pointer-events: auto;
}
.chip-bar::-webkit-scrollbar { width: 0; }
.chip {
  padding: 7px 16px; border-radius: 16px;
  font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.chip.on { background: #f1f5f9; color: #0a0a0a; border-color: #f1f5f9; }

/* ── Card container ── */
#card-container {
  width: 100%; height: 100%;
  position: relative;
}

.feed-card {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center;
  padding: 10vh 7vw;
  padding-bottom: max(10vh, env(safe-area-inset-bottom, 40px) + 30px);
  will-change: transform;
}
.feed-card.anim { transition: transform 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

/* ── Card type styles ── */
.card-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  margin-bottom: 3vh; width: fit-content;
  opacity: 0.7;
}
.card-emoji { font-size: 42px; margin-bottom: 2.5vh; }
.card-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(22px, 5vw, 34px);
  font-weight: 900; line-height: 1.3;
  color: #f1f5f9; margin-bottom: 2vh;
}
.card-body {
  font-size: clamp(14px, 2.5vw, 17px);
  line-height: 1.8; color: #cbd5e1;
  max-width: 540px;
}
.card-body strong { color: #f8fafc; font-weight: 600; }

/* misconception */
.mis-box { margin-bottom: 2.5vh; }
.mis-label { font-size: 12px; color: #64748b; letter-spacing: 0.1em; margin-bottom: 6px; }
.mis-text { font-size: clamp(15px, 3vw, 19px); line-height: 1.6; }
.mis-myth .mis-text { color: #f87171; text-decoration: line-through; text-decoration-color: rgba(248,113,113,0.3); }
.mis-truth .mis-text { color: #34d399; }

/* quote */
.quote-mark { font-size: 48px; color: #a855f7; line-height: 1; margin-bottom: 1vh; }
.quote-text {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(20px, 4.5vw, 30px);
  font-weight: 700; line-height: 1.5;
  color: #e9d5ff; margin-bottom: 2vh;
}
.quote-author { font-size: 14px; color: #a78bfa; margin-bottom: 1.5vh; }
.quote-context { font-size: 14px; color: #94a3b8; line-height: 1.6; }

/* data */
.data-big {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(40px, 10vw, 64px);
  font-weight: 900; color: #fbbf24; line-height: 1.1;
  margin-bottom: 1.5vh;
}
.data-sub { font-size: 14px; color: #f59e0b; margin-bottom: 2vh; }

/* story */
.story-date {
  font-size: 13px; color: #64748b; letter-spacing: 0.1em;
  margin-bottom: 1.5vh;
}

/* debate entry */
.debate-entry {
  border: 2px solid rgba(168,85,247,0.3);
  border-radius: 20px; padding: 20px;
  background: rgba(168,85,247,0.06);
  margin-top: 1vh;
}
.debate-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; margin-bottom: 8px; color: #94a3b8;
}
.debate-row span {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.debate-tap {
  margin-top: 14px; font-size: 13px; color: #c084fc;
  display: flex; align-items: center; gap: 4px;
}

/* source */
.card-source {
  margin-top: 3vh; font-size: 11px; color: #475569;
  padding-top: 1.5vh;
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* ── Progress ── */
#feed-progress {
  position: absolute; bottom: max(2vh, env(safe-area-inset-bottom, 10px));
  left: 50%; transform: translateX(-50%);
  z-index: 15; display: flex; gap: 5px;
}
#feed-progress .fd {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
}
#feed-progress .fd.done { background: rgba(255,255,255,0.4); }
#feed-progress .fd.now { background: #f1f5f9; }

.bottom-swipe-hint {
  position: absolute; bottom: max(5vh, 40px);
  left: 50%; transform: translateX(-50%); z-index: 10;
  font-size: 11px; color: #475569; pointer-events: none;
  animation: hintFloat 2s ease-in-out infinite;
}
@keyframes hintFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
  50% { transform: translateX(-50%) translateY(-5px); opacity: 1; }
}

/* ═══ DEBATE OVERLAY ═══ */
#debate-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: #050505;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
  display: flex; flex-direction: column;
}
#debate-overlay.open { transform: translateY(0); }

.debate-topbar {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: max(3vh, env(safe-area-inset-top, 12px)) 5vw;
}
.btn-debate-back {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8; font-size: 13px; font-weight: 600;
  padding: 8px 16px; border-radius: 20px; cursor: pointer;
  backdrop-filter: blur(10px);
}
.debate-counter { font-size: 12px; color: #475569; font-weight: 600; }

#debate-progress {
  position: absolute; top: max(3vh, env(safe-area-inset-top, 12px));
  left: 50%; transform: translateX(-50%);
  z-index: 25; display: flex; gap: 6px;
}
#debate-progress .db {
  width: 28px; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.12);
}
#debate-progress .db.done { background: rgba(255,255,255,0.4); }
#debate-progress .db.now { background: #f1f5f9; }

#debate-stack {
  flex: 1; position: relative; overflow: hidden;
  touch-action: pan-y;
}

.dcard {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  padding: max(10vh, 70px) 6vw max(4vh, 30px);
  padding-bottom: max(4vh, env(safe-area-inset-bottom, 30px));
  will-change: transform;
}
.dcard.danim { transition: transform 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

.dcard::before {
  content: ''; position: absolute; inset: 12px;
  border-radius: 24px; opacity: 0.06; z-index: 0;
}
.dcard.thesis::before     { background: #3b82f6; }
.dcard.antithesis::before { background: #ef4444; }
.dcard.synthesis::before  { background: #a855f7; }

.dcard-tag {
  position: relative; z-index: 1;
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
  margin-bottom: 2vh; padding: 6px 16px; border-radius: 20px;
  width: fit-content;
  backdrop-filter: blur(10px);
}
.thesis .dcard-tag     { color: #60a5fa; background: rgba(59,130,246,0.15); }
.antithesis .dcard-tag { color: #f87171; background: rgba(239,68,68,0.15); }
.synthesis .dcard-tag  { color: #c084fc; background: rgba(168,85,247,0.15); }

.dcard-tag .tdot { width: 8px; height: 8px; border-radius: 50%; }
.thesis .tdot     { background: #3b82f6; }
.antithesis .tdot { background: #ef4444; }
.synthesis .tdot  { background: #a855f7; }

.dcard-label {
  position: relative; z-index: 1;
  font-size: 14px; font-weight: 600; color: #64748b;
  margin-bottom: 1.5vh; letter-spacing: 0.04em;
}

.dcard-content {
  position: relative; z-index: 1;
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; gap: 2.5vh; max-width: 560px;
}

.dcard-idea {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(22px, 5vw, 34px);
  font-weight: 900; line-height: 1.25; color: #f1f5f9;
}
.thesis .dcard-idea     { color: #bfdbfe; }
.antithesis .dcard-idea { color: #fecaca; }
.synthesis .dcard-idea  { color: #e9d5ff; }

.dcard-explain {
  font-size: clamp(14px, 2.5vw, 16px);
  line-height: 1.8; color: #cbd5e1;
}
.dcard-explain strong { color: #f8fafc; font-weight: 600; }

.dcard-prompt {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; color: #64748b;
  padding: 13px 16px; border-radius: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  line-height: 1.6;
}

/* Side stage marker */
.stage-marker {
  position: absolute; right: 5vw;
  top: 50%; transform: translateY(-50%);
  z-index: 5;
  display: flex; flex-direction: column; gap: 14px;
  opacity: 0.25;
}
.stage-marker .sm {
  width: 2px; height: 20px; border-radius: 2px;
  background: #475569;
  transition: all 0.3s ease;
}
.thesis .stage-marker .sm:nth-child(1),
.antithesis .stage-marker .sm:nth-child(2),
.synthesis .stage-marker .sm:nth-child(3) {
  opacity: 1; width: 3px;
}
.thesis .stage-marker .sm:nth-child(1)     { background: #3b82f6; }
.antithesis .stage-marker .sm:nth-child(2) { background: #ef4444; }
.synthesis .stage-marker .sm:nth-child(3)  { background: #a855f7; }

@media (min-width: 768px) {
  .feed-card { padding: 12vh 16vw; }
  .dcard { padding: 12vh 14vw 6vh; }
}
</style>
</head>

<div id="app">

  <!-- ═══ MAIN FEED ═══ -->

    <div class="chip-bar" id="chip-bar"></div>

  <div id="debate-overlay">
    <div class="debate-topbar">
      <button class="btn-debate-back" id="btn-debate-back">

      <span class="debate-counter" id="debate-counter"></span>
    </div>
    <div id="debate-progress"></div>
    <div id="debate-stack"></div>
  </div>
</div>

//  FEED ENGINE
// ═══════════════════════════════════════
const container = document.getElementById('card-container');
const progressEl = document.getElementById('feed-progress');
const chipBar = document.getElementById('chip-bar');
const swipeHint = document.getElementById('swipe-hint');

let filteredCards = [...FEED];
let feedIdx = 0;
let cardEls = [];
let feedMoving = false;

// ── Category chips ──
const cats = ['全部', ...new Set(FEED.map(c => c.cat))];
let activeFilter = '全部';

function buildChips() {
  chipBar.innerHTML = '';
  cats.forEach(cat => {
    const c = document.createElement('div');
    c.className = 'chip' + (cat === activeFilter ? ' on' : '');
    c.textContent = cat;
    c.addEventListener('click', () => {
      activeFilter = cat;
      buildChips();
      applyFilter();
    });
    chipBar.appendChild(c);
  });
}

function applyFilter() {
  filteredCards = activeFilter === '全部'
    ? [...FEED]
    : FEED.filter(c => c.cat === activeFilter);
  feedIdx = 0;
  buildFeed();
}

// ── Render card HTML ──
function renderCardHTML(card) {
  switch (card.type) {
    case 'fact':
      return `<div class="card-tag">冷知识 · ${card.cat}</div>
        <div class="card-emoji">${card.emoji}</div>
        <div class="card-title">${card.title}</div>
        <div class="card-body">${card.body}</div>
        ${card.src ? `<div class="card-source">📚 ${card.src}</div>` : ''}`;

    case 'misconception':
      return `<div class="card-tag">纠误解 · ${card.cat}</div>
        <div class="card-emoji">${card.emoji}</div>
        <div class="mis-box mis-myth"><div class="mis-label">你可能以为</div><div class="mis-text">${card.myth}</div></div>
        <div class="mis-box mis-truth"><div class="mis-label">实际上</div><div class="mis-text">${card.truth}</div></div>
        ${card.src ? `<div class="card-source">📚 ${card.src}</div>` : ''}`;

    case 'story':
      return `<div class="card-tag">故事 · ${card.cat}</div>
        <div class="card-emoji">${card.emoji}</div>
        <div class="story-date">${card.date}</div>
        <div class="card-title">${card.title}</div>
        <div class="card-body">${card.body}</div>
        ${card.src ? `<div class="card-source">📚 ${card.src}</div>` : ''}`;

    case 'quote':
      return `<div class="card-tag">名句 · ${card.cat}</div>
        <div class="card-emoji">${card.emoji}</div>
        <div class="quote-mark">"</div>
        <div class="quote-text">${card.quote}</div>
        <div class="quote-author">—— ${card.author}${card.date ? '，'+card.date : ''}${card.role ? '，'+card.role : ''}</div>
        <div class="quote-context">${card.context}</div>
        ${card.src ? `<div class="card-source">📚 ${card.src}</div>` : ''}`;

    case 'data':
      return `<div class="card-tag">数据 · ${card.cat}</div>
        <div class="card-emoji">${card.emoji}</div>
        <div class="data-big">${card.big}</div>
        <div class="data-sub">${card.sub}</div>
        <div class="card-body">${card.insight}</div>
        ${card.src ? `<div class="card-source">📚 ${card.src}</div>` : ''}`;

    case 'debate-entry':
      return `<div class="card-tag">思想辩论 · ${card.cat}</div>
        <div class="card-emoji">${card.emoji}</div>
        <div class="card-title">${card.title}</div>
        <div class="card-body" style="margin-bottom:1vh">${card.hook}</div>
        <div class="debate-entry">
          <div class="debate-row"><span style="background:#3b82f6"></span>${card.previewPos}</div>
          <div class="debate-row"><span style="background:#ef4444"></span>${card.previewNeg}</div>
          <div class="debate-tap">👆 点击进入辩论</div>
        </div>`;

    default: return '';
  }
}

// ── Build feed ──
function buildFeed() {
  container.innerHTML = '';
  progressEl.innerHTML = '';
  cardEls = [];

  if (filteredCards.length === 0) {
    container.innerHTML = '<div style="color:#475569;text-align:center;padding-top:45vh;font-size:16px">这个分类还没有内容</div>';
    return;
  }

  filteredCards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'feed-card';
    el.innerHTML = renderCardHTML(card);
    el.style.transform = 'translate3d(0, 100%, 0)';
    el._cardData = card;
    el._idx = i;
    // Click handler for debate-entry
    if (card.type === 'debate-entry') {
      el.style.cursor = 'pointer';
      el.addEventListener('click', (e) => {
        if (Math.abs(lastTouchY - touchStartY) > 5) return; // was a swipe
        openDebate(card.debateId);
      });
    }
    container.appendChild(el);
    cardEls.push(el);

    const dot = document.createElement('div');
    dot.className = 'fd';
    progressEl.appendChild(dot);
  });

  cardEls[0].style.transform = 'translate3d(0, 0, 0)';
  updateFeedDots(0);
  swipeHint.style.display = 'block';
}

function updateFeedDots(idx) {
  const dots = progressEl.querySelectorAll('.fd');
  dots.forEach((d, i) => {
    d.classList.remove('done', 'now');
    if (i < idx) d.classList.add('done');
    if (i === idx) d.classList.add('now');
  });
  if (idx > 0) swipeHint.style.display = 'none';
  else swipeHint.style.display = 'block';
}

// ── Feed swipe ──
function feedGoTo(idx, dir) {
  if (idx < 0 || idx >= cardEls.length || feedMoving) return;
  feedMoving = true;

  const oldEl = cardEls[feedIdx];
  const newEl = cardEls[idx];

  // Position new card
  if (dir === 'up') newEl.style.transform = 'translate3d(0, 100%, 0)';
  else newEl.style.transform = 'translate3d(0, -105%, 0)';

  oldEl.classList.add('anim');
  newEl.classList.add('anim');
  newEl.offsetHeight;

  if (dir === 'up') {
    oldEl.style.transform = 'translate3d(0, -105%, 0)';
    newEl.style.transform = 'translate3d(0, 0, 0)';
  } else {
    oldEl.style.transform = 'translate3d(0, 105%, 0)';
    newEl.style.transform = 'translate3d(0, 0, 0)';
  }

  feedIdx = idx;
  updateFeedDots(idx);

  setTimeout(() => {
    oldEl.classList.remove('anim');
    oldEl.style.transition = 'none';
    oldEl.style.transform = 'translate3d(0, 100%, 0)';
    oldEl.offsetHeight;
    oldEl.style.transition = '';

    newEl.classList.remove('anim');
    feedMoving = false;
  }, 320);
}

let touchStartY = 0, lastTouchY = 0;
document.getElementById('feed').addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
  lastTouchY = touchStartY;
}, { passive: true });

document.getElementById('feed').addEventListener('touchend', (e) => {
  if (debateOpen || feedMoving) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  lastTouchY = e.changedTouches[0].clientY;
  if (dy < -50) feedGoTo(feedIdx + 1, 'up');
  else if (dy > 50) feedGoTo(feedIdx - 1, 'down');
});

document.getElementById('feed').addEventListener('wheel', (e) => {
  if (debateOpen || feedMoving) return;
  if (e.deltaY > 40) feedGoTo(feedIdx + 1, 'up');
  else if (e.deltaY < -40) feedGoTo(feedIdx - 1, 'down');
}, { passive: true });

document.addEventListener('keydown', (e) => {
  if (debateOpen) return;
  if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); feedGoTo(feedIdx + 1, 'up'); }
  if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); feedGoTo(feedIdx - 1, 'down'); }
});

//  DEBATE ENGINE
// ═══════════════════════════════════════
const dOverlay = document.getElementById('debate-overlay');
const dStack = document.getElementById('debate-stack');
const dProgress = document.getElementById('debate-progress');
const dCounter = document.getElementById('debate-counter');
const btnDBack = document.getElementById('btn-debate-back');

let debateOpen = false;
let dCards = [], dIdx = 0, dMoving = false, dEls = [];

btnDBack.addEventListener('click', closeDebate);

function openDebate(id) {
  const debate = DEBATES.find(d => d.id === id);
  if (!debate) return;
  dCards = debate.cards;
  dIdx = 0;
  dMoving = false;
  dStack.innerHTML = '';
  dProgress.innerHTML = '';

  dCards.forEach((c) => {
    const el = document.createElement('div');
    el.className = `dcard ${c.type}`;
    el.innerHTML = `
      <div class="stage-marker"><div class="sm"></div><div class="sm"></div><div class="sm"></div></div>
      <div class="dcard-tag"><span class="tdot"></span>${c.tag}</div>
      <div class="dcard-label">${debate.cat}</div>
      <div class="dcard-content">
        <div class="dcard-idea">${c.idea}</div>
        <div class="dcard-explain">${c.explain}</div>
        <div class="dcard-prompt">💬 ${c.prompt}</div>
      </div>
    `;
    el.style.transform = 'translate3d(0, 100%, 0)';
    dStack.appendChild(el);

    const dot = document.createElement('div'); dot.className = 'db';
    dProgress.appendChild(dot);
  });

  dEls = dStack.querySelectorAll('.dcard');
  dEls[0].style.transform = 'translate3d(0, 0, 0)';
  updateDebateUI();
  dOverlay.classList.add('open');
  debateOpen = true;
}

function closeDebate() {
  dOverlay.classList.remove('open');
  debateOpen = false;
  setTimeout(() => { dStack.innerHTML = ''; dProgress.innerHTML = ''; }, 400);
}

function updateDebateUI() {
  dCounter.textContent = `${dIdx + 1} / ${dCards.length}`;
  const dots = dProgress.querySelectorAll('.db');
  dots.forEach((d, i) => {
    d.classList.remove('done', 'now');
    if (i < dIdx) d.classList.add('done');
    if (i === dIdx) d.classList.add('now');
  });
}

function debateGoTo(idx, dir) {
  if (idx < 0 || idx >= dCards.length || dMoving) return;
  dMoving = true;
  const oldEl = dEls[dIdx];
  const newEl = dEls[idx];

  if (dir === 'up') newEl.style.transform = 'translate3d(0, 100%, 0)';
  else newEl.style.transform = 'translate3d(0, -105%, 0)';

  oldEl.classList.add('danim');
  newEl.classList.add('danim');
  newEl.offsetHeight;

  if (dir === 'up') {
    oldEl.style.transform = 'translate3d(0, -105%, 0)';
    newEl.style.transform = 'translate3d(0, 0, 0)';
  } else {
    oldEl.style.transform = 'translate3d(0, 105%, 0)';
    newEl.style.transform = 'translate3d(0, 0, 0)';
  }
  dIdx = idx;
  updateDebateUI();

  setTimeout(() => {
    oldEl.classList.remove('danim');
    oldEl.style.transition = 'none';
    oldEl.style.transform = 'translate3d(0, 100%, 0)';
    oldEl.offsetHeight;
    oldEl.style.transition = '';
    newEl.classList.remove('danim');
    dMoving = false;
  }, 320);
}

// ── Debate touch ──
let dtStart = 0;
document.addEventListener('touchstart', (e) => {
  if (!debateOpen) return;
  dtStart = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (!debateOpen || dMoving) return;
  const dy = e.changedTouches[0].clientY - dtStart;
  if (dy < -50) debateGoTo(dIdx + 1, 'up');
  else if (dy > 50) debateGoTo(dIdx - 1, 'down');
});

document.addEventListener('wheel', (e) => {
  if (!debateOpen || dMoving) return;
  if (e.deltaY > 40) debateGoTo(dIdx + 1, 'up');
  else if (e.deltaY < -40) debateGoTo(dIdx - 1, 'down');
}, { passive: true });

document.addEventListener('keydown', (e) => {
  if (!debateOpen) return;
  if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); debateGoTo(dIdx + 1, 'up'); }
  if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); debateGoTo(dIdx - 1, 'down'); }
  if (e.key === 'Escape') closeDebate();
});

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
buildChips();
applyFilter();
