<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
<title>辩论证伪 · 知识卡片流</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="辩论证伪">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="description" content="每一个问题都有三面：正方、反方、综合。刷的不是下一个知识点，而是同一个问题的不同立场在打架。">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #050505;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }

  /* ══════════════════════════════════════
     HOME SCREEN
     ══════════════════════════════════════ */
  #home-screen {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: radial-gradient(ellipse at 50% 0%, #0f172a 0%, #050505 60%);
    overflow: hidden;
  }

  .home-header {
    padding: max(4vh, 28px) 6vw 2vh;
    padding-top: max(4vh, calc(env(safe-area-inset-top, 0px) + 20px));
    flex-shrink: 0;
    position: relative; z-index: 2;
  }
  .home-header .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 900; color: #f1f5f9;
    letter-spacing: 0.04em;
  }
  .home-header .subtitle {
    font-size: 13px; color: #64748b;
    margin-top: 6px; letter-spacing: 0.08em;
  }

  /* ── Category filter chips ── */
  .category-chips {
    display: flex; gap: 8px; padding: 0 6vw 2vh;
    flex-shrink: 0; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .category-chips::-webkit-scrollbar { width: 0; }
  .chip {
    padding: 8px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    white-space: nowrap; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8; background: transparent;
    transition: all 0.25s;
  }
  .chip.active {
    background: #f1f5f9; color: #0a0a0a; border-color: #f1f5f9;
  }

  /* ── Horizontal swipe carousel ── */
  #carousel {
    flex: 1; position: relative;
    overflow: hidden;
    touch-action: pan-x;
    display: flex; align-items: center;
    justify-content: center;
  }
  #carousel-track {
    display: flex; align-items: center;
    transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
    will-change: transform;
  }

  .carousel-card {
    flex-shrink: 0;
    width: 82vw; max-width: 380px;
    margin: 0 3.5vw;
    border-radius: 24px;
    padding: 28px 22px 24px;
    cursor: pointer;
    position: relative;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    transition: transform 0.35s ease, opacity 0.35s ease, border-color 0.35s ease;
    opacity: 0.35;
    transform: scale(0.86);
  }
  .carousel-card.active {
    opacity: 1; transform: scale(1);
    border-color: rgba(255,255,255,0.18);
    box-shadow: 0 0 60px rgba(255,255,255,0.03);
  }
  .carousel-card.selected {
    border-color: rgba(168,85,247,0.4);
    box-shadow: 0 0 40px rgba(168,85,247,0.1);
  }

  /* Colored top accent bar */
  .carousel-card::before {
    content: ''; position: absolute; top: 0; left: 20%; right: 20%;
    height: 3px; border-radius: 0 0 3px 3px;
    transition: opacity 0.35s;
  }
  .carousel-card:not(.active)::before { opacity: 0.3; }
  .carousel-card.ac0::before { background: #f59e0b; }
  .carousel-card.ac1::before { background: #3b82f6; }
  .carousel-card.ac2::before { background: #06b6d4; }
  .carousel-card.ac3::before { background: #ef4444; }
  .carousel-card.ac4::before { background: #10b981; }

  .carousel-card .cc-emoji { font-size: 38px; margin-bottom: 10px; }
  .carousel-card .cc-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 21px; font-weight: 900; color: #f1f5f9;
    margin-bottom: 8px;
  }
  .carousel-card .cc-hook {
    font-size: 14px; color: #94a3b8; line-height: 1.55;
    margin-bottom: 14px;
  }
  .carousel-card .cc-meta {
    display: flex; align-items: center; gap: 10px;
  }
  .carousel-card .cc-cat {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    color: #64748b; padding: 4px 10px; border-radius: 10px;
    background: rgba(255,255,255,0.05);
  }
  .carousel-card .cc-flow {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: #475569;
  }
  .carousel-card .cc-flow span {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .carousel-card .tap-hint {
    position: absolute; right: 16px; bottom: 16px;
    font-size: 11px; color: #475569;
    display: flex; align-items: center; gap: 4px;
    opacity: 0; transition: opacity 0.35s;
  }
  .carousel-card.active .tap-hint { opacity: 1; }

  /* ── Page dots ── */
  #slide-dots {
    display: flex; justify-content: center; gap: 8px;
    padding: 2.5vh 0;
    padding-bottom: max(2.5vh, calc(env(safe-area-inset-bottom, 0px) + 10px));
    flex-shrink: 0;
  }
  #slide-dots .sdot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: all 0.3s;
  }
  #slide-dots .sdot.active {
    background: #f1f5f9; width: 20px; border-radius: 3px;
  }

  /* ══════════════════════════════════════
     FEED SCREEN (swipe view)
     ══════════════════════════════════════ */
  #feed-screen {
    position: fixed; inset: 0; z-index: 100;
    background: #050505;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
    display: flex; flex-direction: column;
  }
  #feed-screen.open { transform: translateY(0); }

  .feed-topbar {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 30;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: max(3vh, 16px) 5vw;
    padding-top: max(3vh, env(safe-area-inset-top, 16px));
  }
  .btn-back {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8; font-size: 14px; font-weight: 600;
    padding: 10px 18px; border-radius: 28px;
    cursor: pointer;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: background 0.2s;
  }
  .btn-back:active { background: rgba(255,255,255,0.12); }
  .btn-back svg { width: 16px; height: 16px; }

  .feed-counter {
    font-size: 12px; color: #475569;
    font-weight: 600; letter-spacing: 0.08em;
  }

  /* ── Swipe cards ── */
  #card-stack {
    flex: 1; position: relative;
    overflow: hidden;
    touch-action: pan-y;
  }

  .card {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    padding: max(10vh, 70px) 6vw max(4vh, 30px);
    padding-bottom: max(4vh, env(safe-area-inset-bottom, 30px));
    transform: translateY(100%);
    transition: transform 0.42s cubic-bezier(0.22, 0.61, 0.36, 1);
    will-change: transform;
  }
  .card.active   { transform: translateY(0); }
  .card.exit-up  { transform: translateY(-105%); }
  .card.exit-down{ transform: translateY(105%); }

  .card::before {
    content: ''; position: absolute; inset: 12px;
    border-radius: 24px;
    opacity: 0.06;
    z-index: 0;
  }
  .card.thesis::before      { background: #3b82f6; }
  .card.antithesis::before  { background: #ef4444; }
  .card.synthesis::before   { background: #a855f7; }

  /* ── Card internals ── */
  .type-tag {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.15em;
    margin-bottom: 2vh;
    padding: 6px 16px; border-radius: 20px;
    width: fit-content;
    backdrop-filter: blur(10px);
  }
  .thesis .type-tag      { color: #60a5fa; background: rgba(59,130,246,0.15); }
  .antithesis .type-tag  { color: #f87171; background: rgba(239,68,68,0.15); }
  .synthesis .type-tag   { color: #c084fc; background: rgba(168,85,247,0.15); }

  .type-tag .tag-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .thesis .type-tag .tag-dot      { background: #3b82f6; }
  .antithesis .type-tag .tag-dot  { background: #ef4444; }
  .synthesis .type-tag .tag-dot   { background: #a855f7; }

  .debate-label {
    position: relative; z-index: 1;
    font-size: clamp(14px, 2.5vw, 16px);
    font-weight: 600; color: #64748b;
    margin-bottom: 1.5vh; letter-spacing: 0.05em;
  }

  .card-content {
    position: relative; z-index: 1;
    flex: 1; display: flex; flex-direction: column;
    justify-content: center;
    gap: 2.5vh; max-width: 560px;
  }

  .big-idea {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(24px, 5.5vw, 38px);
    font-weight: 900; line-height: 1.25;
    color: #f1f5f9;
  }
  .thesis .big-idea      { color: #bfdbfe; }
  .antithesis .big-idea  { color: #fecaca; }
  .synthesis .big-idea   { color: #e9d5ff; }

  .explanation {
    font-size: clamp(14px, 2.5vw, 17px);
    font-weight: 400; line-height: 1.8;
    color: #cbd5e1;
  }
  .explanation strong { color: #f8fafc; font-weight: 600; }

  .think-prompt {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; color: #64748b;
    padding: 13px 16px; border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    line-height: 1.6;
  }
  .think-prompt .prompt-icon { font-size: 18px; flex-shrink: 0; }

  /* ── Triplet indicator (right side) ── */
  .triplet-indicator {
    position: absolute; right: 5vw;
    top: 50%; transform: translateY(-50%);
    z-index: 5;
    display: flex; flex-direction: column;
    gap: 14px;
    opacity: 0.25;
  }
  .triplet-indicator .tick {
    width: 2px; height: 20px; border-radius: 2px;
    transition: all 0.4s ease;
    background: #475569;
  }
  .thesis .triplet-indicator .tick:nth-child(1),
  .antithesis .triplet-indicator .tick:nth-child(2),
  .synthesis .triplet-indicator .tick:nth-child(3) {
    opacity: 1; width: 3px;
  }
  .thesis .triplet-indicator .tick:nth-child(1)      { background: #3b82f6; }
  .antithesis .triplet-indicator .tick:nth-child(2)  { background: #ef4444; }
  .synthesis .triplet-indicator .tick:nth-child(3)   { background: #a855f7; }

  /* ── Progress bar (top) ── */
  #progress {
    position: absolute; top: max(3vh, 16px);
    left: 50%; transform: translateX(-50%);
    z-index: 25;
    display: flex; gap: 6px;
    pointer-events: none;
  }
  #progress .pdot {
    width: 30px; height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.12);
    transition: all 0.35s ease;
  }
  #progress .pdot.done    { background: rgba(255,255,255,0.45); }
  #progress .pdot.current { background: #f1f5f9; }

  /* ── Bottom hint (first card only) ── */
  .bottom-hint {
    position: absolute; bottom: max(3vh, 20px);
    bottom: max(3vh, calc(env(safe-area-inset-bottom, 0px) + 16px));
    left: 50%; transform: translateX(-50%);
    z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    gap: 6px;
    pointer-events: none;
    animation: float 2.5s ease-in-out infinite;
    opacity: 0; transition: opacity 0.3s;
  }
  .bottom-hint.visible { opacity: 1; }
  .bottom-hint span {
    font-size: 11px; letter-spacing: 0.12em; color: #475569;
  }
  .bottom-hint .hint-arrows {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; opacity: 0.5;
  }
  .bottom-hint .hint-arrows svg { width: 18px; height: 18px; stroke: #64748b; }

  @keyframes float {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-6px); }
  }

  /* ── Empty state (when no feed open) ── */
  #feed-screen .empty-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #1e293b; font-size: 48px;
    pointer-events: none;
  }

  /* ── Responsive ── */
  @media (min-width: 768px) {
    .carousel-card { width: 60vw; max-width: 440px; }
    .card { padding: 12vh 14vw 6vh; }
    .card-content { max-width: 640px; }
  }
  @media (min-width: 1024px) {
    .carousel-card { width: 50vw; max-width: 500px; }
    .card { padding: 14vh 22vw 8vh; }
    .card-content { max-width: 680px; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     HOME SCREEN
     ═══════════════════════════════════ -->
<div id="home-screen">
  <div class="home-header">
    <div class="logo">辩论证伪</div>
    <div class="subtitle">每一个问题都有三面：正方 · 反方 · 综合</div>
  </div>
  <div class="category-chips" id="category-chips"></div>
  <div id="carousel">
    <div id="carousel-track"></div>
  </div>
  <div id="slide-dots"></div>
</div>

<!-- ═══════════════════════════════════
     FEED SCREEN (swipe feed)
     ═══════════════════════════════════ -->
<div id="feed-screen">
  <div class="feed-topbar">
    <button class="btn-back" id="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      合集
    </button>
    <span class="feed-counter" id="feed-counter"></span>
  </div>
  <div id="progress"></div>
  <div id="card-stack"></div>
  <div class="bottom-hint" id="hint">
    <div class="hint-arrows">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
    </div>
    <span>上滑继续</span>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  DATA
// ══════════════════════════════════════
const COLLECTIONS = [
  {
    id: 0,
    emoji: '📜',
    title: '秦始皇 · 书同文',
    category: '历史 / 文化',
    hook: '"统一"究竟是文明的基石，还是多样性的终结？',
    cards: [
      { type:'thesis', tag:'正方 · 统一论', idea:'"书同文"是中国文化史上最伟大的奠基工程之一。', explain:'秦始皇推行<strong>统一文字</strong>（小篆、隶书），结束了战国数百年的"言语异声、文字异形"。从此，<strong>行政效率大幅提升</strong>，中央政令可以准确传达至帝国每个角落，为中国此后两千年的大一统格局奠定了最根本的沟通基础。', prompt:'没有统一的文字系统，一个大帝国能维持多久？罗马帝国在拉丁文统一之前又是什么状态？' },
      { type:'antithesis', tag:'反方 · 多元论', idea:'统一文字消灭了六国多元的文化基因。', explain:'楚国简帛、齐国刀币铭文、中山国石刻……每一种文字都承载着独特的<strong>思维方式与美学传统</strong>。秦的"焚书"搭配"书同文"，本质是用行政暴力铲除文化多样性。我们今天读不到楚国视角的战国史，正是这种统一付出的<strong>不可逆代价</strong>。', prompt:'如果楚文字幸存，中国文学的面貌会不会完全不同？多样性 vs 效率，哪个更根本？' },
      { type:'synthesis', tag:'综合 · 辩证', idea:'统一不是目的，是工具——关键是"谁"来定义"统一"。', explain:'书同文的历史价值不容否认：它让中国成为一个<strong>可以对话的共同体</strong>。但反方的提醒同样重要——<strong>统一的价值取决于统一的"标准"由谁、以何种方式制定</strong>。秦式的强制统一 vs 自然演化形成的通用规范，是两种截然不同的模式。今天的普通话推广、互联网平台的内容标准，都在重演这组张力。', prompt:'今天的"标准普通话 vs 方言保护"，是不是书同文2.0？你的母语是什么，它还活着吗？' }
    ]
  },
  {
    id: 1,
    emoji: '🎓',
    title: '科举 · 千年大实验',
    category: '历史 / 制度',
    hook: '它让寒门出贵子，也把思想关进了标准答案的笼子。',
    cards: [
      { type:'thesis', tag:'正方 · 功绩论', idea:'科举是人类历史上最先进的人才选拔制度。', explain:'在门阀世袭垄断一切的时代，科举第一次让<strong>"知识改变命运"成为现实</strong>。北宋名臣如范仲淹、欧阳修皆出身寒门，凭才学入仕。相比同时期欧洲的贵族世袭和教会垄断，科举提供了<strong>空前的社会流动性</strong>，维系了中国官僚体系的稳定与更新长达1300年。', prompt:'如果没有科举，中国古代社会会不会像印度种姓制度一样固化？' },
      { type:'antithesis', tag:'反方 · 异化论', idea:'科举最终沦为思想的牢笼，而非解放的工具。', explain:'从王安石改革到明清八股取士，科举逐渐僵化为<strong>"标准化考试工业化"</strong>。士子穷尽一生背诵四书五经、揣摩"标准答案"，<strong>创造力与批判思维被系统性压制</strong>。明代科举只考四书五经、不考数学和自然科学——这直接导致中国在近代科技革命中集体掉队。', prompt:'如果一个制度选拔出来的人只会服从规范，这算是"选拔"还是"筛选"？' },
      { type:'synthesis', tag:'综合 · 辩证', idea:'开放通道 ≠ 开放思想。真正的问题是"考什么"和"谁出题"。', explain:'科举的设计逻辑——用<strong>统一标准选拔人才</strong>——至今仍是高考、公务员考试、SAT的底层模板。它的进步在于<strong>打破世袭通道</strong>，它的危险在于<strong>通过"标准答案"塑造所有人的思维</strong>。一个好的选拔制度，应该测试"你如何思考"，而不是"你是否背了正确答案"。', prompt:'你正在经历的高考/应试教育，和科举之间有多远的距离？如果让你设计考试，你会怎么改？' }
    ]
  },
  {
    id: 2,
    emoji: '⛵',
    title: '郑和下西洋 · 航海之谜',
    category: '历史 / 全球史',
    hook: '世界上最强的舰队，为什么自己烧了图纸、退回大陆？',

// ══════════════════════════════════════
//  BUILD HOME SCREEN — carousel
// ══════════════════════════════════════
const track       = document.getElementById('carousel-track');
const slideDots   = document.getElementById('slide-dots');
const chipBar     = document.getElementById('category-chips');

let homeCards     = [];   // card DOM elements
let homeIndex     = 0;    // current centered card
let homeTotal     = COLLECTIONS.length;
let homeAnimating = false;

// ── Category chips ──
const allCats = ['全部', ...new Set(COLLECTIONS.map(c => c.category.split(' / ')[0]))];
let activeCat = '全部';
let filteredIdx = []; // indices of COLLECTIONS matching filter

function buildChips() {
  chipBar.innerHTML = '';
  allCats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (cat === activeCat ? ' active' : '');
    chip.textContent = cat;
    chip.addEventListener('click', () => {
      activeCat = cat;
      buildChips();
      applyFilter();
    });
    chipBar.appendChild(chip);
  });
}

function applyFilter() {
  filteredIdx = [];
  COLLECTIONS.forEach((col, i) => {
    if (activeCat === '全部' || col.category.startsWith(activeCat)) {
      filteredIdx.push(i);
    }
  });
  buildCarousel();
}

// ── Build carousel cards ──
function buildCarousel() {
  track.innerHTML = '';
  slideDots.innerHTML = '';
  homeCards = [];
  homeTotal = filteredIdx.length;
  homeIndex = 0;

  if (homeTotal === 0) {
    track.innerHTML = '<div style="color:#475569;text-align:center;width:100vw">暂无该分类的合集</div>';
    return;
  }

  filteredIdx.forEach((ci, fi) => {
    const col = COLLECTIONS[ci];
    const card = document.createElement('div');
    card.className = `carousel-card ac${ci % 5}`;
    card.innerHTML = `
      <div class="cc-emoji">${col.emoji}</div>
      <div class="cc-title">${col.title}</div>
      <div class="cc-hook">${col.hook}</div>
      <div class="cc-meta">
        <span class="cc-cat">${col.category}</span>
        <span class="cc-flow">
          <span style="background:#3b82f6"></span>
          <span style="background:#ef4444"></span>
          <span style="background:#a855f7"></span>
          3 层博弈
        </span>
      </div>
      <div class="tap-hint">👆 点击进入</div>
    `;
    card.addEventListener('click', () => openCollection(ci));
    track.appendChild(card);
    homeCards.push(card);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'sdot';
    slideDots.appendChild(dot);
  });

  updateCarousel(0, false);
}

function updateCarousel(idx, animate = true) {
  homeIndex = idx;
  if (!animate) track.style.transition = 'none'; else track.style.transition = '';

  // Center the active card
  const cardW = homeCards[0]?.offsetWidth || 300;
  const margin = window.innerWidth * 0.035;
  const fullW = cardW + margin * 2;
  const offset = -(fullW * idx) + (window.innerWidth - cardW) / 2 - margin;
  track.style.transform = `translateX(${offset}px)`;

  if (!animate) {
    requestAnimationFrame(() => { track.style.transition = ''; });
  }

  // Update active state
  homeCards.forEach((c, i) => {
    c.classList.toggle('active', i === idx);
  });

  // Update dots
  const dots = slideDots.querySelectorAll('.sdot');
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
}

// ── Horizontal swipe ──
let carouselTouchX = 0;
document.getElementById('carousel').addEventListener('touchstart', (e) => {
  carouselTouchX = e.touches[0].clientX;
}, { passive: true });

document.getElementById('carousel').addEventListener('touchend', (e) => {
  if (homeAnimating || homeTotal <= 1) return;
  const dx = e.changedTouches[0].clientX - carouselTouchX;
  if (dx < -60 && homeIndex < homeTotal - 1) {
    updateCarousel(homeIndex + 1);
  } else if (dx > 60 && homeIndex > 0) {
    updateCarousel(homeIndex - 1);
  }
});

// Mouse drag support
let mouseDown = false, mouseStartX = 0;
document.getElementById('carousel').addEventListener('mousedown', (e) => {
  mouseDown = true; mouseStartX = e.clientX;
});
document.addEventListener('mouseup', (e) => {
  if (!mouseDown || homeAnimating || homeTotal <= 1) { mouseDown = false; return; }
  mouseDown = false;
  const dx = e.clientX - mouseStartX;
  if (dx < -60 && homeIndex < homeTotal - 1) updateCarousel(homeIndex + 1);
  else if (dx > 60 && homeIndex > 0) updateCarousel(homeIndex - 1);
});

// Keyboard: ← → to browse
document.addEventListener('keydown', (e) => {
  if (feedScreen.classList.contains('open')) return;
  if (e.key === 'ArrowRight' && homeIndex < homeTotal - 1) updateCarousel(homeIndex + 1);
  if (e.key === 'ArrowLeft' && homeIndex > 0) updateCarousel(homeIndex - 1);
});

// ── Init ──
buildChips();
applyFilter();

// Re-center on resize
window.addEventListener('resize', () => {
  if (!feedScreen.classList.contains('open') && homeCards.length > 0) {
    updateCarousel(homeIndex, false);
  }
});

// ══════════════════════════════════════
//  FEED SCREEN LOGIC
// ══════════════════════════════════════
const feedScreen  = document.getElementById('feed-screen');
const cardStack   = document.getElementById('card-stack');
const progressBar = document.getElementById('progress');
const hint        = document.getElementById('hint');
const counter     = document.getElementById('feed-counter');
const btnBack     = document.getElementById('btn-back');

let currentCards = [];
let currentIdx   = 0;
let isAnimating  = false;
let cardElements  = [];

btnBack.addEventListener('click', () => {
  closeFeed();
  setTimeout(() => { if (homeCards.length > 0) updateCarousel(homeIndex, false); }, 500);
});

function openCollection(idx) {
  const col = COLLECTIONS[idx];
  currentCards = col.cards;
  currentIdx   = 0;
  isAnimating  = false;

  // Clear & build cards
  cardStack.innerHTML = '';
  progressBar.innerHTML = '';
  hint.classList.remove('visible');

  currentCards.forEach((_, i) => {
    const dot = document.createElement('div'); dot.className = 'pdot';
    progressBar.appendChild(dot);
  });

  currentCards.forEach((c) => {
    const el = document.createElement('div');
    el.className = `card ${c.type}`;
    el.innerHTML = `
      <div class="triplet-indicator">
        <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      </div>
      <div class="type-tag"><span class="tag-dot"></span>${c.tag}</div>
      <div class="debate-label">${col.category}</div>
      <div class="card-content">
        <div class="big-idea">${c.idea}</div>
        <div class="explanation">${c.explain}</div>
        <div class="think-prompt">
          <span class="prompt-icon">💬</span>
          <span>${c.prompt}</span>
        </div>
      </div>
    `;
    cardStack.appendChild(el);
  });

  cardElements = cardStack.querySelectorAll('.card');
  cardElements[0].classList.add('active');
  updateFeedProgress(0);

  // Open feed
  feedScreen.classList.add('open');
  counter.textContent = `1 / ${currentCards.length}`;

  // Show hint on first card
  if (currentCards.length > 1) hint.classList.add('visible');
}

function closeFeed() {
  feedScreen.classList.remove('open');
  // Clean up after transition
  setTimeout(() => {
    cardStack.innerHTML = '';
    progressBar.innerHTML = '';
    currentCards = [];
    cardElements = [];
    currentIdx = 0;
  }, 450);
}

function updateFeedProgress(idx) {
  const dots = progressBar.querySelectorAll('.pdot');
  dots.forEach((d, i) => {
    d.classList.remove('done', 'current');
    if (i < idx) d.classList.add('done');
    if (i === idx) d.classList.add('current');
  });
  counter.textContent = `${idx + 1} / ${currentCards.length}`;

  // Hint only on first card
  if (idx === 0 && currentCards.length > 1) hint.classList.add('visible');
  else hint.classList.remove('visible');
}

function goTo(idx, dir) {
  if (idx < 0 || idx >= currentCards.length || isAnimating) return;
  isAnimating = true;

  const oldEl = cardElements[currentIdx];
  const newEl = cardElements[idx];

  oldEl.classList.add(dir === 'up' ? 'exit-up' : 'exit-down');
  oldEl.classList.remove('active');
  newEl.classList.remove('exit-up', 'exit-down');
  newEl.classList.add('active');

  currentIdx = idx;
  updateFeedProgress(idx);

  setTimeout(() => {
    oldEl.classList.remove('exit-up', 'exit-down');
    isAnimating = false;
  }, 420);
}

function swipeUp()   { goTo(currentIdx + 1, 'up'); }
function swipeDown() { goTo(currentIdx - 1, 'down'); }

// ══════════════════════════════════════
//  INPUT HANDLERS (on feed)
// ══════════════════════════════════════
let touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  if (!feedScreen.classList.contains('open')) return;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (!feedScreen.classList.contains('open') || isAnimating) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy < -50) swipeUp();
  else if (dy > 50) swipeDown();
});

let wheelAcc = 0;
document.addEventListener('wheel', (e) => {
  if (!feedScreen.classList.contains('open') || isAnimating) return;
  wheelAcc += e.deltaY;
  if (wheelAcc > 80)  { swipeUp();   wheelAcc = 0; }
  if (wheelAcc < -80) { swipeDown(); wheelAcc = 0; }
}, { passive: true });

document.addEventListener('keydown', (e) => {
  if (!feedScreen.classList.contains('open')) return;
  if (e.key === 'ArrowDown' || e.key === 'j')  { e.preventDefault(); swipeUp(); }
  if (e.key === 'ArrowUp'   || e.key === 'k')  { e.preventDefault(); swipeDown(); }
  if (e.key === 'Escape') {
    closeFeed();
    setTimeout(() => { if (homeCards.length > 0) updateCarousel(homeIndex, false); }, 500);
  }
});

console.log('🧠 辩论证伪 · 合集 → 卡片流 已就绪');
console.log('   ' + COLLECTIONS.length + ' 个合集，每组合集 3 层博弈');
console.log('   点击合集卡片进入 → 上滑刷正/反/综合 → 左上角返回');

  navigator.serviceWorker.register('/sw.js').then(() => {
    console.log('📦 SW registered — offline ready');
  }).catch(() => {
    console.log('📦 SW skipped (localhost or http)');
  });
}
